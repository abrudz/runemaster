<!DOCTYPE html>
<html lang="en" id="root">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RuneMaster</title>
    <link rel="stylesheet" href="index.css"/>
    <script src="index.js"></script>
  </head>
  <body>
    <dialog id="msg">
      <p id="msgp">message</p>
      <form method="dialog"><button autofocus>OK</button></form>
    </dialog>
    <dialog id="ask">
      <p id="askp">question</p>
      <form onsubmit="return false">
        <input id="aski" inputmode="none" autofocus autocomplete="off" spellcheck="false" onkeydown="if(event.key=='Enter')ans(aski.value)">
        <p><button id="asks" type="button" onclick="ans(aski.value)">Submit</button> <button type="button" onclick="aski.value='';ask.close()">Cancel</button></p>
      </form>
      <fieldset><legend> allowed runes — click to insert </legend><div id="askb"></div></fieldset>
    </dialog>
    <i id="i">🧍‍</i>
    <table id="M"></table>
    <div id="util">
      <table id="belt">
        <caption>Collected runes</caption>
        <tr><th>Emerald:</th><td></td></tr>
        <tr><th>Ruby:</th><td></td></tr>
        <tr><th>Sapphire:</th><td></td></tr>
        <tr><th>Amethyst:</th><td></td></tr>
        <tr><th>Diamond:</th><td></td></tr>
      </table>
      <div id="side">
        <div id="topbar"><span id="left"></span> <button onclick="reset()">Restart</button></div>
        <table id="mini"></table>
      </div>
    </div>
  </body>
</html>
